<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>图形拼组 · 一年级下册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: #fdeff2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 10px;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 12px; background: #ffdbe5; border-radius: 40px;
            margin-bottom: 8px; font-weight: 600; color: #b3567a;
            font-size: 0.9rem; box-shadow: 0 4px 8px rgba(255,180,200,0.3);
        }
        .top-bar .time {
            background: white; padding: 4px 16px; border-radius: 30px;
            letter-spacing: 1px; box-shadow: inset 0 2px 3px #ffeef2;
        }
        .top-bar .title { font-size: 1.2rem; display: flex; align-items: center; gap: 4px; }
        .playground { display: flex; flex: 1; gap: 12px; min-height: 0; }

        .shop {
            width: 160px; background: #fff0f5; border-radius: 32px;
            padding: 16px 8px; box-shadow: 0 10px 0 #ffb6c1, 0 8px 16px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; border: 3px solid white;
            overflow-y: auto; gap: 12px;
        }
        .shop h3 {
            text-align: center; color: #b84a6a; font-size: 1.2rem;
            margin: 0 0 5px 0; background: white; border-radius: 50px;
            padding: 8px 0; box-shadow: 0 3px 0 #f9a8b8;
        }
        .shape-grid { display: flex; flex-direction: column; gap: 16px; align-items: center; }
        .shape-card {
            background: white; width: 130px; border-radius: 30px;
            padding: 8px 0; display: flex; flex-direction: column;
            align-items: center; box-shadow: 0 5px 0 #f5b0c0, 0 6px 10px rgba(0,0,0,0.05);
            border: 2px solid white; cursor: grab; -webkit-user-drag: element;
        }
        .shape-card:active { opacity: 0.7; transform: scale(0.97); cursor: grabbing; }
        .shape-card svg { width: 60px; height: 60px; display: block; pointer-events: none; }
        .shape-name {
            font-size: 0.8rem; font-weight: 600; background: #fee3c0;
            padding: 4px 12px; border-radius: 30px; margin-top: 4px; color: #985446;
        }

        .canvas-area {
            flex: 1; background: #f8fcff; border-radius: 48px;
            box-shadow: 0 10px 0 #b0d4e8, 0 8px 20px rgba(0,0,0,0.1);
            border: 5px solid white; display: flex; flex-direction: column;
            padding: 12px; position: relative;
        }
        .canvas-tools {
            display: flex; justify-content: center; gap: 15px;
            padding: 8px 0 12px 0; flex-wrap: wrap;
        }
        .cute-btn {
            background: white; border: none; font-family: 'Quicksand', sans-serif;
            font-weight: 700; font-size: 1.1rem; padding: 10px 20px;
            border-radius: 50px; box-shadow: 0 5px 0 #ffafc0, 0 5px 10px rgba(0,0,0,0.1);
            color: #b3426a; display: inline-flex; align-items: center; gap: 6px;
            cursor: pointer; transition: 0.1s ease; border: 3px solid white;
        }
        .cute-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #ffafc0; }
        .flip-group { display: flex; gap: 8px; }
        .flip-btn { background: #ffe2ab; box-shadow: 0 4px 0 #e5b57a; padding: 8px 15px; font-size: 0.9rem; color: #7a4d2e; }
        .delete-btn { background: #ffc1c1; box-shadow: 0 4px 0 #e18f8f; color: #a13d3d; }

        #canvas-container {
            flex: 1; background: #fef8e7; border-radius: 36px;
            box-shadow: inset 0 0 0 3px white, inset 0 0 0 6px #e5f0f5;
            position: relative; overflow: hidden; touch-action: none;
        }
        #canvas { width: 100%; height: 100%; display: block; border-radius: 32px; background: #fdf5ea; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #ffe1d0; border-radius: 20px; }
        ::-webkit-scrollbar-thumb { background: #f9a79c; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="title"><span>🍭</span> 图形拼组</div>
        <div class="time" id="live-time">10:39:40</div>
    </div>
    <div class="playground">
        <div class="shop"><h3>📦 图形商店</h3><div class="shape-grid" id="shape-shop"></div></div>
        <div class="canvas-area">
            <div class="canvas-tools">
                <button class="cute-btn" id="clearCanvas">🧽 清空拼组</button>
                <div class="flip-group">
                    <button class="cute-btn flip-btn" id="flipX">↔️ 左右翻转</button>
                    <button class="cute-btn flip-btn" id="flipY">↕️ 上下翻转</button>
                </div>
                <button class="cute-btn delete-btn" id="deleteSelected">🗑️ 删除</button>
            </div>
            <div id="canvas-container"><canvas id="canvas" width="600" height="400"></canvas></div>
        </div>
    </div>

    <script>
        (function() {
            function updateTime() {
                const now = new Date();
                const hh = String(now.getHours()).padStart(2,'0');
                const mm = String(now.getMinutes()).padStart(2,'0');
                const ss = String(now.getSeconds()).padStart(2,'0');
                document.getElementById('live-time').innerText = `${hh}:${mm}:${ss}`;
            }
            setInterval(updateTime,1000); updateTime();

            const canvasElement = document.getElementById('canvas');
            const canvasContainer = document.getElementById('canvas-container');
            const canvas = new fabric.Canvas('canvas', {
                allowTouchScrolling: false, selection: true,
                preserveObjectStacking: true, centeredRotation: true,
                width: canvasContainer.clientWidth, height: canvasContainer.clientHeight
            });

            fabric.Object.prototype.set({
                transparentCorners: false, cornerColor: '#ff99aa', cornerSize: 12,
                cornerStyle: 'circle', borderColor: '#ff6b8b',
                borderScaleFactor: 2, rotatingPointOffset: 18
            });

            function resizeCanvas() {
                const containerWidth = canvasContainer.clientWidth;
                const containerHeight = canvasContainer.clientHeight;
                canvasElement.width = containerWidth; canvasElement.height = containerHeight;
                canvas.setWidth(containerWidth); canvas.setHeight(containerHeight);
                canvas.renderAll();
            }
            window.addEventListener('resize', resizeCanvas);
            setTimeout(resizeCanvas, 50);

            // 图形数据（顺序：长方形①、横长方形②、正方形、不等边三角形、直角三角形、等腰直角三角形、等边三角形、平行四边形、圆形）
            const shopData = [
                { type: 'rectangle1', name: '长方形①', color: '#6fa3d9', svg: '<svg viewBox="0 0 60 60"><rect x="5" y="15" width="40" height="30" rx="4" fill="#6fa3d9" stroke="#000000" stroke-width="2"/></svg>' },
                { type: 'rectangle2', name: '长方形②', color: '#3987c9', svg: '<svg viewBox="0 0 60 60"><rect x="2" y="16" width="56" height="28" rx="4" fill="#3987c9" stroke="#000000" stroke-width="2"/></svg>' },
                { type: 'square', name: '正方形', color: '#8cc084', svg: '<svg viewBox="0 0 60 60"><rect x="10" y="10" width="40" height="40" rx="6" fill="#8cc084" stroke="#000000" stroke-width="2"/></svg>' },
                // 不等边三角形：恢复为上一版本并上下翻转，预览 points="0,50 60,50 41,27"
                { type: 'triangle_scalene', name: '不等边三角形', color: '#f5717e', svg: '<svg viewBox="0 0 60 60"><polygon points="0,50 60,50 41,27" fill="#f5717e" stroke="#000000" stroke-width="2"/></svg>' },
                { type: 'triangle_right', name: '直角三角形', color: '#b987e0', svg: '<svg viewBox="0 0 60 60"><polygon points="10,55 40,55 10,5" fill="#b987e0" stroke="#000000" stroke-width="2"/></svg>' },
                { type: 'triangle_isoscelesRight', name: '等腰直角三角形', color: '#f0a58b', svg: '<svg viewBox="0 0 60 60"><polygon points="10,50 50,50 10,10" fill="#f0a58b" stroke="#000000" stroke-width="2"/></svg>' },
                { type: 'triangle_equilateral', name: '等边三角形', color: '#fc9ac7', svg: '<svg viewBox="0 0 60 60"><polygon points="30,4 8,48 52,48" fill="#fc9ac7" stroke="#000000" stroke-width="2"/></svg>' },
                { type: 'parallelogram', name: '平行四边形', color: '#f9b952', svg: '<svg viewBox="0 0 60 60"><polygon points="12,10 48,10 58,50 22,50" fill="#f9b952" stroke="#000000" stroke-width="2"/></svg>' },
                { type: 'circle', name: '圆形', color: '#ff99aa', svg: '<svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="24" fill="#ff99aa" stroke="#000000" stroke-width="2"/></svg>' }
            ];

            const shopEl = document.getElementById('shape-shop');
            shopData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'shape-card';
                card.setAttribute('draggable', 'true');
                card.setAttribute('data-shape', item.type);
                card.innerHTML = `${item.svg}<span class="shape-name">${item.name}</span>`;
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', item.type);
                    e.dataTransfer.effectAllowed = 'copy';
                });
                shopEl.appendChild(card);
            });

            // 创建图形
            function createShape(shapeType, left, top, color) {
                let obj;
                const strokeColor = '#000000';
                const strokeWidth = 2.5;
                switch(shapeType) {
                    case 'rectangle1':
                        obj = new fabric.Rect({ width: 50, height: 35, fill: '#6fa3d9', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'rectangle2':
                        obj = new fabric.Rect({ width: 70, height: 35, fill: '#3987c9', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'square':
                        obj = new fabric.Rect({ width: 55, height: 55, fill: '#8cc084', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'parallelogram':
                        obj = new fabric.Polygon([{x:-30,y:-20},{x:30,y:-20},{x:45,y:20},{x:-15,y:20}],
                            { fill: '#f9b952', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'triangle_equilateral':
                        obj = new fabric.Polygon([{x:0,y:-33},{x:-28,y:16},{x:28,y:16}],
                            { fill: '#fc9ac7', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'triangle_right':
                        // 直角在左下角
                        obj = new fabric.Polygon([{x:-15,y:30},{x:15,y:30},{x:-15,y:-30}],
                            { fill: '#b987e0', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'triangle_isoscelesRight':
                        // 直角在左下角
                        obj = new fabric.Polygon([{x:-20,y:30},{x:30,y:30},{x:-20,y:-20}],
                            { fill: '#f0a58b', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'triangle_scalene':
                        // 不等边三角形：恢复为上一版本 (-45,-10),(35,-10),(10,20) 并上下翻转，即 (-45,10),(35,10),(10,-20)
                        obj = new fabric.Polygon([{x:-45,y:10},{x:35,y:10},{x:10,y:-20}],
                            { fill: '#f5717e', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    case 'circle':
                        obj = new fabric.Circle({ radius: 30, fill: '#ff99aa', stroke: strokeColor, strokeWidth: strokeWidth, originX: 'center', originY: 'center' });
                        break;
                    default:
                        obj = new fabric.Rect({ width: 40, height: 40, fill: '#ccc', stroke: strokeColor, strokeWidth: strokeWidth });
                }
                obj.set({ left: left, top: top });
                return obj;
            }

            // 拖拽放置
            const container = document.getElementById('canvas-container');
            container.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
            container.addEventListener('drop', (e) => {
                e.preventDefault();
                const shapeType = e.dataTransfer.getData('text/plain');
                if (!shapeType) return;
                const rect = canvasElement.getBoundingClientRect();
                const pointer = { x: e.clientX - rect.left, y: e.clientY - rect.top };
                if (pointer.x < 0 || pointer.y < 0 || pointer.x > canvas.width || pointer.y > canvas.height) return;
                const colorItem = shopData.find(d => d.type === shapeType);
                const color = colorItem ? colorItem.color : '#ffb6c1';
                const newShape = createShape(shapeType, pointer.x, pointer.y, color);
                canvas.add(newShape);
                canvas.setActiveObject(newShape);
                canvas.renderAll();
            });

            // 翻转与删除
            document.getElementById('flipX').addEventListener('click', () => {
                const active = canvas.getActiveObject();
                if (active) { active.set('flipX', !active.flipX); canvas.renderAll(); } else alert('请先选中一个图形');
            });
            document.getElementById('flipY').addEventListener('click', () => {
                const active = canvas.getActiveObject();
                if (active) { active.set('flipY', !active.flipY); canvas.renderAll(); } else alert('请先选中一个图形');
            });
            document.getElementById('deleteSelected').addEventListener('click', () => {
                const active = canvas.getActiveObject();
                if (active) { canvas.remove(active); canvas.discardActiveObject(); canvas.renderAll(); } else alert('请先选中要删除的图形');
            });
            document.getElementById('clearCanvas').addEventListener('click', () => {
                canvas.clear();
                canvas.setBackgroundColor('#fdf5ea', () => {});
                canvas.renderAll();
            });

            // 初始示例
            canvas.setBackgroundColor('#fdf5ea', () => {});
            setTimeout(() => {
                canvas.add(createShape('circle', 150, 150), createShape('square', 280, 180), createShape('triangle_equilateral', 400, 200));
                canvas.renderAll();
            }, 200);
        })();
    </script>
</body>
</html>
